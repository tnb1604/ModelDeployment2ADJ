name: teamA2 - Build, Push & Deploy Iris API

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v

  build-and-push:
    name: Build and Push to Azure Container Registry
    runs-on: ubuntu-latest
    needs: test

    outputs:
      image_tag: ${{ steps.set_tag.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set image tag (latest + git SHA for traceability)
        id: set_tag
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/iris-classifier:latest \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/iris-classifier:${{ steps.set_tag.outputs.tag }} \
            .

      - name: Push Docker image to ACR
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/iris-classifier:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/iris-classifier:${{ steps.set_tag.outputs.tag }}

      - name: Summary
        run: |
          echo "✅ Pushed iris-classifier:latest and iris-classifier:${{ steps.set_tag.outputs.tag }}"

  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App with new image
        run: |
          az containerapp update \
            --name team-a2-iris-api \
            --resource-group A21 \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/iris-classifier:latest

      - name: Print live URL
        run: |
          URL=$(az containerapp show \
            --name team-a2-iris-api \
            --resource-group A21 \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "✅ Deployed to: https://$URL"
